<script src="assets/js/frequency.js"></script>
<script>
/* mini starfield + nav scroll, standalone for this page */
(function () {
  var c = document.getElementById("starfield"), ctx = c.getContext("2d"), stars = [], w, h;
  function resize() {
    w = c.width = innerWidth; h = c.height = innerHeight;
    var count = Math.min(160, Math.floor(w * h / 9000));
    stars = Array.from({ length: count }, function () {
      return { x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.3 + 0.2,
        a: Math.random() * 0.6 + 0.2, tw: Math.random() * 0.02 + 0.004, d: Math.random() < .5 ? 1 : -1 };
    });
  }
  function tick() {
    ctx.clearRect(0, 0, w, h);
    stars.forEach(function (s) {
      s.a += s.tw * s.d; if (s.a > .85 || s.a < .15) s.d *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.283);
      ctx.fillStyle = "rgba(226,210,170," + s.a + ")"; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  resize(); addEventListener("resize", resize);
  if (!matchMedia("(prefers-reduced-motion: reduce)").matches) tick();
  var nav = document.getElementById("nav");
  addEventListener("scroll", function () { nav.classList.toggle("scrolled", scrollY > 40); }, { passive: true });
  var t = document.getElementById("nav-toggle");
  if (t) {
    t.addEventListener("click", function () {
      var open = nav.classList.toggle("open");
      t.setAttribute("aria-expanded", open ? "true" : "false");
    });
    Array.prototype.forEach.call(nav.querySelectorAll(".nav-links a"), function (a) {
      a.addEventListener("click", function () { nav.classList.remove("open"); });
    });
  }
})();
</script>
</body>
</html>
